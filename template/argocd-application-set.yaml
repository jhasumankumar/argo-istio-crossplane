apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: httpbin-local-rate-limit
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: minikube-local
            server: https://kubernetes.default.svc

  template:
    metadata:
      name: "httpbin-rate-limit-{{cluster}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/jhasumankumar/argo-istio-crossplane
        targetRevision: main
        path: template
        directory:
          include: "httpbin-local-rate-limit.yaml"
      destination:
        server: "{{server}}"
        namespace: httpbin
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - ApplyOutOfSyncOnly=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 3
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 2m
      ignoreDifferences:
        - group: networking.istio.io
          kind: EnvoyFilter
          jsonPointers:
            - /status
        - group: gateway.networking.k8s.io
          kind: Gateway
          jsonPointers:
            - /status